<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triângulo</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-wrap">
  <header class="header">
    <h1>VerificaTriangulo</h1>
  </header>

  <main class="main">
  <section class="card entrada-card">
    <div class="opcao-entrada">
      <label><input type="radio" name="entrada" value="lados" checked /> Lados</label>
      <label><input type="radio" name="entrada" value="angulos" /> Ângulos</label>
      <label><input type="radio" name="entrada" value="pontos" /> Pontos</label>
    </div>

    <div id="bloco-lados" class="bloco-entrada">
      <p>Digite os lados do triângulo:</p>
      <div class="input-row">
        <input type="number" id="ladoA" placeholder="Lado A" step="any" min="0" />
        <input type="number" id="ladoB" placeholder="Lado B" step="any" min="0" />
        <input type="number" id="ladoC" placeholder="Lado C" step="any" min="0" />
      </div>
    </div>

    <div id="bloco-angulos" class="bloco-entrada" style="display: none;">
    <p>Ângulos (em graus — preencha 2 para o 3º ser calculado):</p>
    <input type="number" id="angA" placeholder="Ângulo A" step="any" min="0" max="180" />
    <input type="number" id="angB" placeholder="Ângulo B" step="any" min="0" max="180" />
    <input type="number" id="angC" placeholder="Ângulo C" step="any" min="0" max="180" />
    <span id="terceiroAngulo"></span>
    <div class="esboco-container">
      <p>Esboço pelos ângulos:</p>
      <canvas id="esboco" width="280" height="200"></canvas>
    </div>
    </div>

    <div id="bloco-pontos" class="bloco-entrada" style="display: none;">
      <p>Coordenadas dos vértices (plano cartesiano):</p>
      <div class="pontos-grid">
        <div class="ponto-grupo">
          <span>A</span>
          <input type="number" id="pAx" placeholder="x" step="any" />
          <input type="number" id="pAy" placeholder="y" step="any" />
        </div>
        <div class="ponto-grupo">
          <span>B</span>
          <input type="number" id="pBx" placeholder="x" step="any" />
          <input type="number" id="pBy" placeholder="y" step="any" />
        </div>
        <div class="ponto-grupo">
          <span>C</span>
          <input type="number" id="pCx" placeholder="x" step="any" />
          <input type="number" id="pCy" placeholder="y" step="any" />
        </div>
      </div>
    </div>

    <button type="button" class="btn-primario" onclick="adicionarTriangulo()">Adicionar triângulo</button>
    <p id="resultado" class="resultado-msg"></p>
  </section>

  <section class="card lista-card">
  <div class="lista-triangulos">
    <p class="lista-titulo">Triângulos</p>
    <ul id="lista-triangulos-ul"></ul>
  </div>
  </section>

  <section class="card canvas-card">
  <div class="canvas-container">
    <canvas id="plano" width="520" height="420"></canvas>
  </div>
  </section>

  <section class="card painel-card">
  <div id="painel-dados" class="painel-dados"></div>
  </section>
  </main>
  </div>

  <script src="arquivo.js"></script>
</body>
</html>
